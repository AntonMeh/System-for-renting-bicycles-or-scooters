services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: coursework-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coursework_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
